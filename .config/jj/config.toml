"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[user]
name = "Mathew Harman"
email = "mathew.harman@gmail.com"

[aliases]
dt = ["diffedit"]

[fix.tools.clang-format]
command = ["clang-format", "--assume-filename=$path"]
patterns = ["glob:**/*.c", "glob:**/*.cpp", "glob:**/*.h", "glob:**/*.hpp"]

[ui]
editor = "nvim"
diff-editor = "nvimdifftool"
diff-instructions = false

[merge-tools.nvimdifftool]
program = "nvim"
diff-args = [
  "-c",
  "packadd nvim.difftool",
  "-c",
  "DiffTool $left $right",
  "-c",
  "lua vim.g.autoformat=false",
]
edit-args = [
  "-c",
  "packadd nvim.difftool",
  "-c",
  "DiffTool $left $right",
  "-c",
  "lua vim.g.autoformat=false",
]

[signing]
behavior = "own"
backend = "gpg"
key = "D5A9E07E5740AA47"
